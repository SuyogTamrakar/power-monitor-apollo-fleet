<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INA228 Power Monitor Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body.dark { background:#1e1e1e; color:#e0e0e0; }
    body.dark .border { border-color:#444; }
    body.dark input { background:#2a2a2a; color:#e0e0e0; border-color:#555; }
    body.dark .bg-white { background:#2a2a2a; }
    td, th { padding: 4px 8px; border: 1px solid #ccc; }
    body.dark td, body.dark th { border-color:#555; }
    .range-btn { padding: 4px 12px; border-radius: 4px; border: 1px solid #d1d5db; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .range-btn:hover { background: #3b82f6; color: white; border-color: #3b82f6; }
    .range-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    body.dark .range-btn { border-color:#555; color:#e0e0e0; }
    body.dark .range-btn:hover, body.dark .range-btn.active { background:#2563eb; border-color:#2563eb; }
  </style>
</head>
<body class="font-sans p-4">

  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">INA228 Power Monitor</h1>
    <div class="flex gap-2">
      <button onclick="toggleDark()" class="px-3 py-1 border rounded text-sm">Dark / Light</button>
      <button onclick="downloadCSV()" class="px-3 py-1 border rounded text-sm">Download CSV</button>
    </div>
  </div>

  <!-- Quick range buttons -->
  <div class="flex flex-wrap gap-2 mb-3">
    <span class="text-sm font-semibold self-center mr-1">Range:</span>
    <button class="range-btn" onclick="setRange(30*60*1000,        this)">Last 30 min</button>
    <button class="range-btn" onclick="setRange(60*60*1000,        this)">Last 1 hour</button>
    <button class="range-btn" onclick="setRange(4*60*60*1000,      this)">Last 4 hours</button>
    <button class="range-btn" onclick="setRange(24*60*60*1000,     this)">Last 24 hours</button>
    <button class="range-btn" onclick="setRange(7*24*60*60*1000,   this)">Last 7 days</button>
    <button class="range-btn" onclick="setRange(30*24*60*60*1000,  this)">Last 1 month</button>
    <button class="range-btn" onclick="setRange(90*24*60*60*1000,  this)">Last 3 months</button>
    <button class="range-btn" onclick="setRange(180*24*60*60*1000, this)">Last 6 months</button>
  </div>

  <!-- Custom date range -->
  <div class="flex flex-wrap gap-3 items-end mb-4">
    <label class="flex flex-col text-sm">
      Start date
      <input id="startDate" type="date" class="border rounded px-2 py-1" onchange="clearActiveRange()" />
    </label>
    <label class="flex flex-col text-sm">
      End date
      <input id="endDate" type="date" class="border rounded px-2 py-1" onchange="clearActiveRange()" />
    </label>
    <button onclick="loadData()" class="px-4 py-1 bg-blue-600 text-white rounded">Load</button>
    <span id="status" class="text-sm text-gray-500 self-center"></span>
    <span id="lastRefresh" class="text-xs text-gray-400 self-center"></span>
  </div>

  <!-- Sensor selector -->
  <div class="mb-4">
    <div class="flex items-center gap-3 mb-1">
      <span class="text-sm font-semibold">Sensors</span>
      <button onclick="selectAllSensors(true)"  class="text-xs text-blue-500 underline">All</button>
      <button onclick="selectAllSensors(false)" class="text-xs text-blue-500 underline">None</button>
    </div>
    <div id="sensorList" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- Charts -->
  <div id="chartCurrent" class="mb-6" style="height:420px"></div>
  <div id="chartVoltage"  class="mb-6" style="height:320px"></div>

  <!-- Stats -->
  <h2 class="text-lg font-semibold mb-2">Statistics</h2>
  <div id="statsPanel" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-6"></div>

  <!-- Day-over-day anomaly alerts -->
  <h2 class="text-lg font-semibold mb-2">Power Anomalies <span class="text-sm font-normal text-gray-400">(today vs yesterday)</span></h2>
  <div id="anomalyPanel" class="flex flex-col gap-2 mb-6"></div>

  <!-- Alert summary -->
  <h2 class="text-lg font-semibold mb-2">Alert Events</h2>
  <div class="overflow-x-auto mb-6">
    <table class="text-sm border-collapse">
      <thead>
        <tr>
          <th>Timestamp</th><th>ID</th><th>Label</th>
          <th>Avg µA</th><th>Current µA</th><th>Voltage V</th><th>Cleared At</th>
        </tr>
      </thead>
      <tbody id="alertTableBody"></tbody>
    </table>
  </div>

  <script src="dashboard.js?v=11"></script>
</body>
</html>
