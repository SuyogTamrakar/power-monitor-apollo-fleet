<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INA228 Power Monitor Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body.dark { background:#1e1e1e; color:#e0e0e0; }
    body.dark .border { border-color:#444; }
    td, th { padding: 4px 8px; border: 1px solid #ccc; }
    body.dark td, body.dark th { border-color: #555; }
  </style>
</head>
<body class="font-sans p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">INA228 Power Monitor</h1>
    <div class="flex gap-2">
      <button onclick="toggleDark()" class="px-3 py-1 border rounded text-sm">Dark / Light</button>
      <button onclick="downloadCSV()" class="px-3 py-1 border rounded text-sm">Download CSV</button>
    </div>
  </div>

  <!-- Date range + load -->
  <div class="flex flex-wrap gap-3 items-end mb-4">
    <label class="flex flex-col text-sm">
      Start date
      <input id="startDate" type="date" class="border rounded px-2 py-1" />
    </label>
    <label class="flex flex-col text-sm">
      End date
      <input id="endDate" type="date" class="border rounded px-2 py-1" />
    </label>
    <button onclick="loadData()" class="px-4 py-1 bg-blue-600 text-white rounded">Load</button>
    <span id="status" class="text-sm text-gray-500"></span>
  </div>

  <!-- Sensor selector -->
  <div class="mb-4">
    <div class="text-sm font-semibold mb-1">Sensors</div>
    <div id="sensorList" class="flex flex-wrap gap-1"></div>
  </div>

  <!-- Charts -->
  <div id="chartCurrent" class="mb-6" style="height:380px"></div>
  <div id="chartVoltage" class="mb-6" style="height:380px"></div>

  <!-- Stats -->
  <h2 class="text-lg font-semibold mb-2">Statistics</h2>
  <div id="statsPanel" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6"></div>

  <!-- Alert summary -->
  <h2 class="text-lg font-semibold mb-2">Alert Events</h2>
  <div class="overflow-x-auto mb-6">
    <table class="text-sm border-collapse">
      <thead>
        <tr>
          <th>Timestamp</th><th>ID</th><th>Label</th>
          <th>Avg mA</th><th>Current mA</th><th>Voltage V</th><th>Cleared At</th>
        </tr>
      </thead>
      <tbody id="alertTableBody"></tbody>
    </table>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
