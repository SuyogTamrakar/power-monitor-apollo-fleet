sampling_interval_s: 10
shunt_ohms: 0.015
max_expected_amps: 2.0
log_dir: "./logs"
log_rotate_days: 1

alert:
  enabled: true
  window_hours: 2
  threshold_ma: 5.0
  gpio_pin: null   # Set to BCM pin number (e.g. 17) to enable GPIO output; null disables
  cooldown_minutes: 30

git:
  auto_commit: true
  commit_interval_s: 0   # 0 = rotation only; e.g. 3600 = hourly
  remote: "origin"

sensors:
  - id: 1
    mux_address: "0x70"
    mux_channel: 0
    enabled: true
    label: "DUT-A1"
  - id: 2
    mux_address: "0x70"
    mux_channel: 1
